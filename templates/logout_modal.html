<!-- ══ LOGOUT CONFIRMATION MODAL ══ -->
<!-- Trigger: replace your logout <a> tag with: <a href="#" onclick="openLogoutModal(); return false;"> -->

<div id="logoutModal" style="
    display:none; position:fixed; z-index:9999;
    inset:0; background:rgba(2,24,46,0.45);
    backdrop-filter:blur(3px);
    align-items:center; justify-content:center;
    animation:lgFadeIn 0.18s ease;
">
    <div style="
        background:white; border-radius:16px;
        width:90%; max-width:360px;
        box-shadow:0 20px 60px rgba(2,24,46,0.18), 0 0 0 1px rgba(0,0,0,0.06);
        animation:lgSlideUp 0.22s cubic-bezier(0.34,1.56,0.64,1);
        overflow:hidden;
    ">
        <!-- Top bar -->
        <div style="height:4px; background:linear-gradient(90deg,#02182E,#3d6680);"></div>

        <!-- Body -->
        <div style="padding:32px 28px 24px; text-align:center;">

            <!-- Icon -->
            <div style="
                width:52px; height:52px; border-radius:14px;
                background:#f1f5f9; margin:0 auto 18px;
                display:flex; align-items:center; justify-content:center;
            ">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </div>

            <!-- Text -->
            <div style="font-size:17px; font-weight:700; color:#0f172a; margin-bottom:8px; letter-spacing:-0.2px;">
                Log out?
            </div>
            <div style="font-size:13px; color:#94a3b8; line-height:1.6;">
                You'll be returned to the login page.
            </div>
        </div>

        <!-- Buttons -->
        <div style="
            display:grid; grid-template-columns:1fr 1fr;
            gap:10px; padding:0 28px 26px;
        ">
            <button
                onclick="closeLogoutModal()"
                style="
                    padding:10px; border-radius:9px;
                    border:1.5px solid #e2e8f0; background:white;
                    font-size:13px; font-weight:600; color:#64748b;
                    cursor:pointer; font-family:inherit;
                    transition:all 0.15s;
                "
                onmouseover="this.style.background='#f8fafc'; this.style.borderColor='#cbd5e1';"
                onmouseout="this.style.background='white'; this.style.borderColor='#e2e8f0';"
            >
                Cancel
            </button>
            <form method="post" action="{% url 'pages:logout' %}" style="margin:0;">
                {% csrf_token %}
                <button
                    id="logoutConfirmBtn"
                    type="submit"
                    style="
                        padding:10px; border-radius:9px;
                        border:none; background:#02182E;
                        font-size:13px; font-weight:600; color:white;
                        cursor:pointer; font-family:inherit;
                        text-decoration:none; display:flex;
                        align-items:center; justify-content:center; gap:6px;
                        transition:all 0.15s;
                        width:100%;
                    "
                    onmouseover="this.style.background='#0f2d4a';"
                    onmouseout="this.style.background='#02182E';"
                >
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Log out
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    @keyframes lgFadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes lgSlideUp { from { opacity:0; transform:translateY(16px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
</style>

<script>
    function openLogoutModal() {
        const m = document.getElementById('logoutModal');
        m.style.display = 'flex';
    }
    function closeLogoutModal() {
        const m = document.getElementById('logoutModal');
        m.style.display = 'none';
    }
    // Close on backdrop click
    document.getElementById('logoutModal').addEventListener('click', function(e) {
        if (e.target === this) closeLogoutModal();
    });
    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeLogoutModal();
    });
</script>
