databases:
  - name: kres-db
    plan: free
    databaseName: kres_admin
    user: kres_admin

services:
  - type: web
    name: kres-admin
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn storefront.wsgi:application"
    envVars:
      - key: DATABASE_URL
        value: "postgresql://postgres:NacaConcepcion_1605@db.iigrjbqwttfadldazvls.supabase.co:5432/postgres"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,krescoadmin.xyz,www.krescoadmin.xyz"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://krescoadmin.xyz,https://www.krescoadmin.xyz"
      - key: PYTHON_VERSION
        value: "3.14.0"
      # AWS S3 Configuration (add these in Render dashboard)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        value: "kres-admin-photos"
      - key: AWS_S3_REGION_NAME
        value: "us-east-1"
