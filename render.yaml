databases:
  - name: kres-db
    plan: free
    databaseName: kres_admin
    user: kres_admin

services:
  - type: web
    name: kres-admin
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn storefront.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kres-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.14.0"
